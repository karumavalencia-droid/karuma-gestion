name: Apply Karuma release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified release patch
        run: |
          test -f .github/karuma-release.patch
          git apply --index .github/karuma-release.patch
          git rm .github/karuma-release.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish Karuma dashboard and mobile clock-in"
          git push origin HEAD:main
